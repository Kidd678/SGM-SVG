<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <style id="v2-motion-style">
@keyframes v2FadeSlide { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
@keyframes v2Pop { 0% { opacity: 0; transform: scale(.92); } 70% { opacity: 1; transform: scale(1.03); } 100% { opacity: 1; transform: scale(1); } }
@keyframes v2Fade { from { opacity: 0; } to { opacity: 1; } }
@keyframes v2Draw { from { opacity: 1; stroke-dashoffset: 900; } to { opacity: 1; stroke-dashoffset: 0; } }
@keyframes v2Highlight { 0% { opacity: 0; } 40% { opacity: 1; filter: brightness(1.18); } 100% { opacity: 1; filter: brightness(1); } }
#title { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 1.00s ease forwards; animation-delay: 0.00s; }
#subtitle { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.80s ease forwards; animation-delay: 0.80s; }
#timeline_axis { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2Fade 1.00s ease forwards; animation-delay: 2.00s; }
#event_1924_founding { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2Pop 0.80s ease forwards; animation-delay: 3.20s; }
#connector_1 { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.50s ease forwards; animation-delay: 4.00s; }
#event_1924_naming { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2Pop 0.80s ease forwards; animation-delay: 4.50s; }
#connector_2 { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.50s ease forwards; animation-delay: 5.30s; }
#event_1930s { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.70s ease forwards; animation-delay: 5.80s; }
#connector_3 { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.50s ease forwards; animation-delay: 6.50s; }
#event_1952 { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.70s ease forwards; animation-delay: 7.00s; }
#connector_4 { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.50s ease forwards; animation-delay: 7.70s; }
#event_1977 { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2Pop 0.80s ease forwards; animation-delay: 8.20s; }
#connector_5 { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.50s ease forwards; animation-delay: 9.00s; }
#event_2000s { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2Pop 1.00s ease forwards; animation-delay: 9.50s; }
#title { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2Highlight 1.50s ease forwards; animation-delay: 10.50s; }
</style><defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF6E3" />
      <stop offset="100%" style="stop-color:#F5E6C8" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37" />
      <stop offset="100%" style="stop-color:#B8860B" />
    </linearGradient>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C41E3A" />
      <stop offset="100%" style="stop-color:#8B0000" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.3" />
    </filter>
  </defs>
  
  
