<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <style id="v2-motion-style">
@keyframes v2FadeSlide { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
@keyframes v2Pop { 0% { opacity: 0; transform: scale(.92); } 70% { opacity: 1; transform: scale(1.03); } 100% { opacity: 1; transform: scale(1); } }
@keyframes v2Fade { from { opacity: 0; } to { opacity: 1; } }
@keyframes v2Draw { from { opacity: 1; stroke-dashoffset: 900; } to { opacity: 1; stroke-dashoffset: 0; } }
@keyframes v2Highlight { 0% { opacity: 0; } 40% { opacity: 1; filter: brightness(1.18); } 100% { opacity: 1; filter: brightness(1); } }
#title { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.55s ease forwards; animation-delay: 0.00s; }
#step_planting { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.55s ease forwards; animation-delay: 0.55s; }
#arrow_1 { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.55s ease forwards; animation-delay: 1.25s; }
#step_harvesting { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.55s ease forwards; animation-delay: 1.65s; }
#arrow_2 { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.55s ease forwards; animation-delay: 2.35s; }
#step_processing { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.55s ease forwards; animation-delay: 2.75s; }
#arrow_3 { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.55s ease forwards; animation-delay: 3.45s; }
#step_roasting { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.55s ease forwards; animation-delay: 3.85s; }
#arrow_4 { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.55s ease forwards; animation-delay: 4.55s; }
#step_grinding { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.55s ease forwards; animation-delay: 4.95s; }
#arrow_5 { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.55s ease forwards; animation-delay: 5.65s; }
#step_brewing { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.55s ease forwards; animation-delay: 6.05s; }
#arrow_6 { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.55s ease forwards; animation-delay: 6.75s; }
#final_cup { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2Pop 0.55s ease forwards; animation-delay: 7.15s; }
</style><defs>
    
    <linearGradient id="coffeeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
