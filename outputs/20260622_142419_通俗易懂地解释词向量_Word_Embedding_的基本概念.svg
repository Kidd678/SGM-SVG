<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <style id="v2-motion-style">
@keyframes v2FadeSlide { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
@keyframes v2Pop { 0% { opacity: 0; transform: scale(.92); } 70% { opacity: 1; transform: scale(1.03); } 100% { opacity: 1; transform: scale(1); } }
@keyframes v2Fade { from { opacity: 0; } to { opacity: 1; } }
@keyframes v2Draw { from { opacity: 1; stroke-dashoffset: 900; } to { opacity: 1; stroke-dashoffset: 0; } }
@keyframes v2Highlight { 0% { opacity: 0; } 40% { opacity: 1; filter: brightness(1.18); } 100% { opacity: 1; filter: brightness(1); } }
#title { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.80s ease forwards; animation-delay: 0.00s; }
#subtitle { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2Fade 0.60s ease forwards; animation-delay: 0.80s; }
#problem { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2Pop 0.80s ease forwards; animation-delay: 1.60s; }
#arrow_1 { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.40s ease forwards; animation-delay: 2.50s; }
#solution { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.80s ease forwards; animation-delay: 3.00s; }
#concept_box { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.80s ease forwards; animation-delay: 3.90s; }
#space_visual { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2Fade 1.00s ease forwards; animation-delay: 4.80s; }
#similar_words { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2Highlight 0.70s ease forwards; animation-delay: 5.90s; }
#vector_example { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2Pop 0.80s ease forwards; animation-delay: 6.70s; }
#arrow_2 { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.40s ease forwards; animation-delay: 7.60s; }
#applications { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.80s ease forwards; animation-delay: 8.10s; }
</style><defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc" />
      <stop offset="100%" style="stop-color:#e2e8f0" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.1" />
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6" />
    </marker>
  </defs>
  
  
  <rect width="1200" height="800" fill="url(#bgGrad)" />
  
  
  <g id="title" data-role="title" data-order="0">
    <text x="600" y="55" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="42" font-weight="bold" fill="#1e293b" text-anchor="middle">词向量</text>
    <text x="600" y="90" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="20" fill="#64748b" text-anchor="middle">(Word Embedding)</text>
  </g>
  
  <g id="subtitle" data-role="subtitle" data-order="1">
    <text x="600" y="125" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">通俗易懂的解释</text>
  </g>
  
  
  <g id="narrative" data-role="description">
    <text x="600" y="160" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#475569" text-anchor="middle">通过将文字转换为数字向量，让计算机能够理解和计算词语之间的语义关系</text>
  </g>
  
  
  <g id="problem" data-role="focal" data-order="2" filter="url(#shadow)">
    <rect x="80" y="200" width="260" height="80" rx="12" fill="#fee2e2" stroke="#fca5a5" stroke-width="2" />
    <text x="210" y="240" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="20" font-weight="bold" fill="#dc2626" text-anchor="middle">计算机不懂文字</text>
    <text x="210" y="265" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#991b1b" text-anchor="middle">只能处理数字</text>
  </g>
  
  
  <g id="arrow_1" data-role="connector" data-order="3">
    <path d="M360 240 L440 240" stroke="#3b82f6" stroke-width="3" fill="none" marker-end="url(#arrowhead)" />
  </g>
  
  
  <g id="solution" data-role="process-node" data-order="4" filter="url(#shadow)">
    <rect x="460" y="200" width="260" height="80" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="2" />
    <text x="590" y="240" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="20" font-weight="bold" fill="#2563eb" text-anchor="middle">转换为数字向量</text>
    <text x="590" y="265" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#1e40af" text-anchor="middle">把文字转成数字</text>
  </g>
  
  
  <g id="arrow_down_1">
    <path d="M590 290 L590 340" stroke="#3b82f6" stroke-width="3" fill="none" marker-end="url(#arrowhead)" />
  </g>
  
  
  <g id="concept_box" data-role="card" data-order="5" filter="url(#shadow)">
    <rect x="460" y="350" width="260" height="60" rx="12" fill="#d1fae5" stroke="#6ee7b7" stroke-width="2" />
    <text x="590" y="385" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="20" font-weight="bold" fill="#059669" text-anchor="middle">词向量 = 数字表示</text>
  </g>
  
  
  <g id="space_visual" data-role="focal" data-order="6">
    <rect x="780" y="200" width="380" height="280" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" />
    <text x="970" y="230" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle">语义空间</text>
    
    <circle cx="880" cy="290" r="10" fill="#8b5cf6" />
    <text x="880" y="320" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#6d28d9" text-anchor="middle">king</text>
    
    <circle cx="920" cy="310" r="10" fill="#8b5cf6" />
    <text x="920" y="340" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#6d28d9" text-anchor="middle">queen</text>
    
    <circle cx="860" cy="320" r="10" fill="#8b5cf6" />
    <text x="860" y="350" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#6d28d9" text-anchor="middle">princess</text>
    
    <circle cx="1000" cy="380" r="10" fill="#06b6d4" />
    <text x="1000" y="410" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#0e7490" text-anchor="middle">man</text>
    
    <circle cx="1050" cy="390" r="10" fill="#06b6d4" />
    <text x="1050" y="420" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#0e7490" text-anchor="middle">woman</text>
    
    <circle cx="840" cy="420" r="10" fill="#f59e0b" />
    <text x="840" y="450" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#d97706" text-anchor="middle">apple</text>
    
    <circle cx="880" cy="440" r="10" fill="#f59e0b" />
    <text x="880" y="470" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#d97706" text-anchor="middle">orange</text>
    
    <text x="970" y="500" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" font-weight="bold" fill="#b45309" text-anchor="middle">相似词靠得更近</text>
  </g>
  
  
  <g id="vector_example" data-role="event" data-order="8" filter="url(#shadow)">
    <rect x="80" y="450" width="380" height="70" rx="12" fill="#f3e8ff" stroke="#c084fc" stroke-width="2" />
    <text x="270" y="490" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="22" font-weight="bold" fill="#7c3aed" text-anchor="middle">king - man + woman ≈ queen</text>
    <text x="270" y="515" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#5b21b6" text-anchor="middle">向量运算展示语义关系</text>
  </g>
  
  
  <g id="arrow_2" data-role="connector" data-order="9">
    <path d="M270 530 L270 580" stroke="#3b82f6" stroke-width="3" fill="none" marker-end="url(#arrowhead)" />
  </g>
  
  
  <g id="applications" data-role="card" data-order="10" filter="url(#shadow)">
    <rect x="80" y="590" width="380" height="60" rx="12" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="2" />
    <text x="270" y="625" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="20" font-weight="bold" fill="#0284c7" text-anchor="middle">应用：搜索、翻译、推荐</text>
  </g>
  
  
  <g id="vector_repr">
    <rect x="780" y="500" width="180" height="90" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
    <text x="870" y="530" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">词向量示例</text>
    <text x="870" y="555" font-family="Consolas, monospace" font-size="12" fill="#64748b" text-anchor="middle">king = [0.82,</text>
    <text x="870" y="572" font-family="Consolas, monospace" font-size="12" fill="#64748b" text-anchor="middle">-0.15, 0.47, ...]</text>
    <text x="870" y="590" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">300维向量</text>
  </g>
</svg>