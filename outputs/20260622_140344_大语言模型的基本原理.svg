<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <style id="v2-motion-style">
@keyframes v2FadeSlide { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
@keyframes v2Pop { 0% { opacity: 0; transform: scale(.92); } 70% { opacity: 1; transform: scale(1.03); } 100% { opacity: 1; transform: scale(1); } }
@keyframes v2Fade { from { opacity: 0; } to { opacity: 1; } }
@keyframes v2Draw { from { opacity: 1; stroke-dashoffset: 900; } to { opacity: 1; stroke-dashoffset: 0; } }
@keyframes v2Highlight { 0% { opacity: 0; } 40% { opacity: 1; filter: brightness(1.18); } 100% { opacity: 1; filter: brightness(1); } }
#title { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.50s ease forwards; animation-delay: 0.00s; }
#corpus { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.50s ease forwards; animation-delay: 0.50s; }
#pretrain { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.50s ease forwards; animation-delay: 1.00s; }
#arrow_corpus_to_pretrain { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.50s ease forwards; animation-delay: 1.50s; }
#transformer { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.50s ease forwards; animation-delay: 2.00s; }
#attention { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2Pop 0.40s ease forwards; animation-delay: 2.50s; }
#arrow_pretrain_to_transformer { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.50s ease forwards; animation-delay: 2.90s; }
#finetune { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.50s ease forwards; animation-delay: 3.40s; }
#arrow_transformer_to_finetune { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.50s ease forwards; animation-delay: 3.90s; }
#generation { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.50s ease forwards; animation-delay: 4.40s; }
#arrow_finetune_to_generation { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.50s ease forwards; animation-delay: 4.90s; }
#conclusion { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.60s ease forwards; animation-delay: 5.40s; }
</style><defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4F7FC" />
      <stop offset="100%" stop-color="#E2E8F0" />
    </linearGradient>

    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4FD1C5" />
      <stop offset="100%" stop-color="#319795" />
    </linearGradient>

    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#63B3ED" />
      <stop offset="100%" stop-color="#3182CE" />
    </linearGradient>

    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A0AEC0" />
      <stop offset="100%" stop-color="#38B2AC" />
    </linearGradient>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1A202C" flood-opacity="0.12" />
    </filter>

    <filter id="focalShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1A202C" flood-opacity="0.18" />
    </filter>

    <filter id="calloutShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#1A202C" flood-opacity="0.15" />
    </filter>

    <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#38B2AC" />
    </marker>
  </defs>

  
  <rect width="1200" height="800" fill="url(#bgGrad)" />

  
  <g fill="#CBD5E0" opacity="0.4">
    <circle cx="200" cy="200" r="2" />
    <circle cx="400" cy="100" r="3" />
    <circle cx="800" cy="150" r="2" />
    <circle cx="1000" cy="250" r="3" />
    <circle cx="100" cy="500" r="2" />
    <circle cx="1100" cy="600" r="3" />
    <circle cx="300" cy="650" r="4" />
    <circle cx="900" cy="700" r="2" />
  </g>

  
  <path d="M 175 365 Q 360 365, 460 240 Q 600 170, 740 240 Q 840 365, 1025 365" fill="none" stroke="#CBD5E0" stroke-width="14" stroke-linecap="round" opacity="0.35" />

  
  <g id="title" data-role="title" data-order="0">
    <text x="600" y="55" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif" font-size="36" font-weight="900" fill="#0F2B46" text-anchor="middle" letter-spacing="2">大语言模型基本原理</text>
    <text x="600" y="85" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif" font-size="15" font-weight="500" fill="#4A5568" text-anchor="middle" letter-spacing="4">LLM FUNDAMENTALS</text>
    <line x1="480" y1="105" x2="720" y2="105" stroke="#63B3ED" stroke-width="3" stroke-linecap="round" />
  </g>

  
  <g id="arrow_corpus_to_pretrain" data-role="connector" data-order="2">
    <path d="M 250 365 C 265 365, 270 300, 285 300" fill="none" stroke="url(#arrowGrad)" stroke-width="4" marker-end="url(#arrowhead)" />
  </g>

  <g id="arrow_pretrain_to_transformer" data-role="connector" data-order="4">
    <path d="M 435 300 C 445 300, 450 240, 460 240" fill="none" stroke="url(#arrowGrad)" stroke-width="4" marker-end="url(#arrowhead)" />
  </g>

  <g id="arrow_transformer_to_finetune" data-role="connector" data-order="7">
    <path d="M 740 240 C 750 240, 755 300, 765 300" fill="none" stroke="url(#arrowGrad)" stroke-width="4" marker-end="url(#arrowhead)" />
  </g>

  <g id="arrow_finetune_to_generation" data-role="connector" data-order="9">
    <path d="M 915 300 C 930 300, 935 365, 950 365" fill="none" stroke="url(#arrowGrad)" stroke-width="4" marker-end="url(#arrowhead)" />
  </g>

  
  <g id="corpus" data-role="process-node" data-order="1">
    <rect x="100" y="315" width="150" height="90" rx="12" fill="url(#nodeGrad)" filter="url(#shadow)" />
    <g transform="translate(130, 345)">
      <path d="M 0 10 C 0 5, 20 5, 20 10 C 20 15, 0 15, 0 10 Z M 0 10 L 0 17 C 0 22, 20 22, 20 17 L 20 10" fill="none" stroke="#FFFFFF" stroke-width="2" />
    </g>
    <text x="185" y="360" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">海量文本语料</text>
    <text x="185" y="387" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif" font-size="15" fill="#E6FFFA" text-anchor="middle">互联网·书籍·文章</text>
  </g>

  
  <g id="pretrain" data-role="process-node" data-order="3">
    <rect x="285" y="255" width="150" height="90" rx="12" fill="url(#nodeGrad)" filter="url(#shadow)" />
    <g transform="translate(315, 285)">
      <rect x="0" y="0" width="16" height="20" fill="none" stroke="#FFFFFF" stroke-width="1.5" />
      <line x1="3" y1="5" x2="13" y2="5" stroke="#FFFFFF" stroke-width="1.5" />
      <line x1="3" y1="9" x2="13" y2="9" stroke="#FFFFFF" stroke-width="1.5" />
      <line x1="3" y1="13" x2="10" y2="13" stroke="#FFFFFF" stroke-width="1.5" />
    </g>
    <text x="370" y="300" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">预训练</text>
    <text x="370" y="327" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif" font-size="15" fill="#E6FFFA" text-anchor="middle">(自监督学习)</text>
  </g>

  
  <g id="transformer" data-role="process-node" data-order="5">
    <rect x="460" y="170" width="280" height="140" rx="16" fill="url(#centerGrad)" filter="url(#shadow)" />
    <g transform="translate(500, 210)">
      <circle cx="0" cy="0" r="4" fill="#FFFFFF" />
      <circle cx="15" cy="0" r="4" fill="#FFFFFF" />
      <circle cx="30" cy="0" r="4" fill="#FFFFFF" />
      <line x1="0" y1="0" x2="15" y2="0" stroke="#FFFFFF" stroke-width="2" />
      <line x1="15" y1="0" x2="30" y2="0" stroke="#FFFFFF" stroke-width="2" />
      <circle cx="7.5" cy="-15" r="3" fill="#FFFFFF" />
      <line x1="0" y1="0" x2="7.5" y2="-15" stroke="#FFFFFF" stroke-width="2" />
      <line x1="15" y1="0" x2="7.5" y2="-15" stroke="#FFFFFF" stroke-width="2" />
    </g>
    <text x="620" y="225" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">Transformer 架构</text>
    <text x="620" y="257" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif" font-size="16" fill="#F0FCFF" text-anchor="middle">核心神经网络，多层堆叠</text>
    <text x="620" y="284" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif" font-size="16" fill="#F0FCFF" text-anchor="middle">自注意力 ⚡ 前馈网络</text>
  </g>

  
  <g id="finetune" data-role="process-node" data-order="8">
    <rect x="765" y="255" width="150" height="90" rx="12" fill="url(#nodeGrad)" filter="url(#shadow)" />
    <g transform="translate(795, 285)">
      <path d="M 5 5 L 15 15 M 15 5 L 5 15" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" />
      <circle cx="10" cy="10" r="6" fill="none" stroke="#FFFFFF" stroke-width="1.5" />
    </g>
    <text x="850" y="300" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">指令微调</text>
    <text x="850" y="327" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif" font-size="15" fill="#E6FFFA" text-anchor="middle">对齐人类意图</text>
  </g>

  
  <g id="generation" data-role="process-node" data-order="10">
    <rect x="950" y="315" width="150" height="90" rx="12" fill="url(#nodeGrad)" filter="url(#shadow)" />
    <g transform="translate(980, 345)">
      <polygon points="5,15 10,20 15,15 10,10" fill="#FFFFFF" />
      <circle cx="20" cy="5" r="4" fill="#FFFFFF" />
      <line x1="17" y1="8" x2="15" y2="15" stroke="#FFFFFF" stroke-width="2" />
    </g>
    <text x="1035" y="360" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">自回归文本生成</text>
    <text x="1035" y="387" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif" font-size="15" fill="#E6FFFA" text-anchor="middle">逐词预测输出</text>
  </g>

  
  <g id="attention" data-role="annotation" data-order="6" filter="url(#calloutShadow)">
    <rect x="500" y="80" width="200" height="65" rx="8" fill="#FFFFFF" />
    <polygon points="585,145 600,170 615,145" fill="#FFFFFF" />
    <text x="600" y="105" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif" font-size="16" font-weight="bold" fill="#2B6CB0" text-anchor="middle">自注意力机制</text>
    <text x="600" y="130" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif" font-size="16" fill="#4A5568" text-anchor="middle">捕获长程依赖关系</text>
  </g>

  
  <g id="conclusion" data-role="focal" data-order="11">
    <rect x="320" y="555" width="560" height="80" rx="14" fill="#FFFFFF" filter="url(#focalShadow)" />
    <rect x="320" y="555" width="560" height="6" rx="3" fill="url(#centerGrad)" />
    <text x="600" y="592" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif" font-size="22" font-weight="900" fill="#0F2B46" text-anchor="middle" letter-spacing="1">LLM = 数据 + 架构 + 生成</text>
    <text x="600" y="620" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif" font-size="16" font-weight="500" fill="#4A5568" text-anchor="middle" letter-spacing="1">三大支柱 · 贯通基本原理</text>
  </g>
</svg>