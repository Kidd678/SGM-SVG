<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <style id="v2-motion-style">
@keyframes v2FadeSlide { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
@keyframes v2Pop { 0% { opacity: 0; transform: scale(.92); } 70% { opacity: 1; transform: scale(1.03); } 100% { opacity: 1; transform: scale(1); } }
@keyframes v2Fade { from { opacity: 0; } to { opacity: 1; } }
@keyframes v2Draw { from { opacity: 1; stroke-dashoffset: 900; } to { opacity: 1; stroke-dashoffset: 0; } }
@keyframes v2Highlight { 0% { opacity: 0; } 40% { opacity: 1; filter: brightness(1.18); } 100% { opacity: 1; filter: brightness(1); } }
#title { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.50s ease forwards; animation-delay: 0.00s; }
#subtitle { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.50s ease forwards; animation-delay: 0.60s; }
#step_planting { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.50s ease forwards; animation-delay: 1.30s; }
#connector_1 { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.30s ease forwards; animation-delay: 1.90s; }
#step_picking { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.50s ease forwards; animation-delay: 2.30s; }
#connector_2 { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.30s ease forwards; animation-delay: 2.90s; }
#step_roasting { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.50s ease forwards; animation-delay: 3.30s; }
#connector_3 { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.30s ease forwards; animation-delay: 3.90s; }
#step_grinding { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.50s ease forwards; animation-delay: 4.30s; }
#connector_4 { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.30s ease forwards; animation-delay: 4.90s; }
#step_brewing { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.50s ease forwards; animation-delay: 5.30s; }
#final_cup { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2Pop 0.70s ease forwards; animation-delay: 5.90s; }
</style><defs>
    
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8F0" />
      <stop offset="100%" style="stop-color:#F5E6D3" />
    </linearGradient>
    
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50" />
      <stop offset="100%" style="stop-color:#2E7D32" />
    </linearGradient>
    
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E53935" />
      <stop offset="100%" style="stop-color:#C62828" />
    </linearGradient>
    
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF7043" />
      <stop offset="100%" style="stop-color:#E64A19" />
    </linearGradient>
    
    <linearGradient id="grayGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#78909C" />
      <stop offset="100%" style="stop-color:#546E7A" />
    </linearGradient>
    
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#42A5F5" />
      <stop offset="100%" style="stop-color:#1976D2" />
    </linearGradient>
    
    <linearGradient id="cupGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8D6E63" />
      <stop offset="100%" style="stop-color:#5D4037" />
    </linearGradient>
    
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.15" />
    </filter>
    
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  
  <rect width="1200" height="800" fill="url(#bgGradient)" />
  
  
  <circle cx="100" cy="150" r="60" fill="#EFEBE9" opacity="0.5" />
  <circle cx="1100" cy="650" r="80" fill="#EFEBE9" opacity="0.5" />
  <circle cx="600" cy="700" r="100" fill="#EFEBE9" opacity="0.3" />
  
  
  <g id="title" data-role="title" data-order="0">
    <text x="600" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#3E2723">咖啡生产流程</text>
  </g>
  
  
  <g id="subtitle" data-role="subtitle" data-order="1">
    <text x="600" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#6D4C41">从一颗咖啡豆到一杯咖啡</text>
  </g>
  
  
  <g id="step_planting" data-role="process-node" data-order="2" filter="url(#shadow)">
    <rect x="80" y="280" width="160" height="200" rx="16" fill="url(#greenGrad)" />
    <text x="160" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">种植</text>
    
    <g transform="translate(115, 340)">
      <rect x="10" y="50" width="10" height="40" fill="#5D4037" />
      <ellipse cx="15" cy="40" rx="25" ry="30" fill="#81C784" />
      <ellipse cx="5" cy="30" rx="15" ry="20" fill="#A5D6A7" />
      <ellipse cx="25" cy="35" rx="12" ry="18" fill="#66BB6A" />
    </g>
    <text x="160" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.9">咖啡树在适宜气候下生长</text>
  </g>
  
  
  <g id="connector_1" data-role="connector" data-order="7">
    <path d="M 250 380 L 290 380" stroke="#8D6E63" stroke-width="4" fill="none" marker-end="url(#arrowhead)" />
    <polygon points="295,375 310,380 295,385" fill="#8D6E63" />
  </g>
  
  
  <g id="step_picking" data-role="process-node" data-order="3" filter="url(#shadow)">
    <rect x="310" y="280" width="160" height="200" rx="16" fill="url(#redGrad)" />
    <text x="390" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">采摘</text>
    
    <g transform="translate(345, 340)">
      <circle cx="15" cy="25" r="12" fill="#C62828" />
      <circle cx="35" cy="25" r="12" fill="#E53935" />
      <circle cx="25" cy="40" r="10" fill="#EF5350" />
      <path d="M 15 13 Q 15 5 20 8" stroke="#5D4037" stroke-width="2" fill="none" />
      <path d="M 35 13 Q 35 5 30 8" stroke="#5D4037" stroke-width="2" fill="none" />
    </g>
    <text x="390" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.9">人工采摘成熟咖啡樱桃</text>
  </g>
  
  
  <g id="connector_2" data-role="connector" data-order="8">
    <path d="M 480 380 L 520 380" stroke="#8D6E63" stroke-width="4" fill="none" />
    <polygon points="525,375 540,380 525,385" fill="#8D6E63" />
  </g>
  
  
  <g id="step_roasting" data-role="process-node" data-order="4" filter="url(#shadow)">
    <rect x="540" y="280" width="160" height="200" rx="16" fill="url(#orangeGrad)" />
    <text x="620" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">烘焙</text>
    
    <g transform="translate(575, 340)">
      <ellipse cx="25" cy="50" rx="30" ry="10" fill="#5D4037" />
      <ellipse cx="25" cy="45" rx="25" ry="8" fill="#795548" />
      <circle cx="15" cy="30" r="8" fill="#8D6E63" />
      <circle cx="35" cy="30" r="8" fill="#A1887F" />
      <circle cx="25" cy="20" r="6" fill="#BCAAA4" />
      
      <path d="M 10 55 Q 5 45 10 35" stroke="#FF5722" stroke-width="2" fill="none" opacity="0.7" />
      <path d="M 25 55 Q 20 45 25 35" stroke="#FF5722" stroke-width="2" fill="none" opacity="0.7" />
      <path d="M 40 55 Q 35 45 40 35" stroke="#FF5722" stroke-width="2" fill="none" opacity="0.7" />
    </g>
    <text x="620" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.9">生豆高温烘焙释放香气</text>
  </g>
  
  
  <g id="connector_3" data-role="connector" data-order="9">
    <path d="M 710 380 L 750 380" stroke="#8D6E63" stroke-width="4" fill="none" />
    <polygon points="755,375 770,380 755,385" fill="#8D6E63" />
  </g>
  
  
  <g id="step_grinding" data-role="process-node" data-order="5" filter="url(#shadow)">
    <rect x="770" y="280" width="160" height="200" rx="16" fill="url(#grayGrad)" />
    <text x="850" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">研磨</text>
    
    <g transform="translate(805, 340)">
      <rect x="10" y="20" width="60" height="40" rx="5" fill="#455A64" />
      <rect x="15" y="25" width="50" height="10" fill="#37474F" />
      <circle cx="40" cy="35" r="15" fill="#607D8B" />
      <circle cx="40" cy="35" r="8" fill="#90A4AE" />
      
      <ellipse cx="40" cy="65" rx="30" ry="8" fill="#6D4C41" />
      <circle cx="25" cy="62" r="3" fill="#5D4037" />
      <circle cx="40" cy="60" r="3" fill="#4E342E" />
      <circle cx="55" cy="62" r="3" fill="#5D4037" />
    </g>
    <text x="850" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.9">咖啡豆研磨成精细粉末</text>
  </g>
  
  
  <g id="connector_4" data-role="connector" data-order="10">
    <path d="M 940 380 L 980 380" stroke="#8D6E63" stroke-width="4" fill="none" />
    <polygon points="985,375 1000,380 985,385" fill="#8D6E63" />
  </g>
  
  
  <g id="step_brewing" data-role="process-node" data-order="6" filter="url(#shadow)">
    <rect x="1000" y="280" width="160" height="200" rx="16" fill="url(#blueGrad)" />
    <text x="1080" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">冲煮</text>
    
    <g transform="translate(1035, 340)">
      
      <path d="M 15 10 L 30 45 L 75 45 L 90 10 Z" fill="#ECEFF1" stroke="#78909C" stroke-width="2" />
      <rect x="30" y="45" width="45" height="8" fill="#CFD8DC" />
      
      <path d="M 25 15 L 35 40" stroke="#B0BEC5" stroke-width="2" />
      <path d="M 45 10 L 45 40" stroke="#B0BEC5" stroke-width="2" />
      <path d="M 65 10 L 55 40" stroke="#B0BEC5" stroke-width="2" />
      <path d="M 75 15 L 65 40" stroke="#B0BEC5" stroke-width="2" />
      
      <path d="M 30 60 L 35 80 L 65 80 L 70 60 Z" fill="white" stroke="#90A4AE" stroke-width="2" />
      
      <path d="M 40 55 Q 35 45 40 35" stroke="white" stroke-width="2" fill="none" opacity="0.6" />
      <path d="M 50 55 Q 45 45 50 35" stroke="white" stroke-width="2" fill="none" opacity="0.6" />
      <path d="M 60 55 Q 55 45 60 35" stroke="white" stroke-width="2" fill="none" opacity="0.6" />
    </g>
    <text x="1080" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.9">热水萃取香浓咖啡</text>
  </g>
  
  
  <g id="final_cup" data-role="focal" data-order="11" filter="url(#glow)">
    
    <ellipse cx="1080" cy="600" rx="120" ry="30" fill="#D7CCC8" opacity="0.5" />
    
    <path d="M 980 520 Q 980 650 1020 680 L 1140 680 Q 1180 650 1180 520 Z" fill="url(#cupGrad)" stroke="#4E342E" stroke-width="3" />
    
    <path d="M 1180 550 Q 1230 550 1230 600 Q 1230 650 1180 650" fill="none" stroke="#5D4037" stroke-width="12" />
    <path d="M 1180 550 Q 1225 550 1225 600 Q 1225 645 1180 650" fill="none" stroke="#6D4C41" stroke-width="8" />
    
    <ellipse cx="1080" cy="530" rx="90" ry="20" fill="#3E2723" />
    <ellipse cx="1080" cy="535" rx="85" ry="15" fill="#4E342E" />
    
    <path d="M 1040 500 Q 1030 470 1040 440" stroke="white" stroke-width="4" fill="none" opacity="0.4" stroke-linecap="round" />
    <path d="M 1080 490 Q 1070 460 1080 430" stroke="white" stroke-width="4" fill="none" opacity="0.5" stroke-linecap="round" />
    <path d="M 1120 500 Q 1110 470 1120 440" stroke="white" stroke-width="4" fill="none" opacity="0.4" stroke-linecap="round" />
    
    <ellipse cx="1080" cy="690" rx="130" ry="25" fill="#EFEBE9" stroke="#BCAAA4" stroke-width="2" />
    <ellipse cx="1080" cy="690" rx="100" ry="18" fill="#D7CCC8" />
    
    <text x="1080" y="620" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">一杯香浓咖啡</text>
    <text x="1080" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D7CCC8">完成</text>
  </g>
  
  
  <g opacity="0.3">
    <ellipse cx="50" cy="700" rx="12" ry="8" fill="#5D4037" transform="rotate(-30 50 700)" />
    <ellipse cx="70" cy="720" rx="12" ry="8" fill="#6D4C41" transform="rotate(20 70 720)" />
    <ellipse cx="1130" cy="200" rx="12" ry="8" fill="#5D4037" transform="rotate(45 1130 200)" />
    <ellipse cx="1150" cy="220" rx="12" ry="8" fill="#6D4C41" transform="rotate(-20 1150 220)" />
  </g>
</svg>