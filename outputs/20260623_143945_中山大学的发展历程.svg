<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  
  
  <style id="v2-motion-style">
@keyframes v2FadeSlide { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
@keyframes v2Pop { 0% { opacity: 0; transform: scale(.92); } 70% { opacity: 1; transform: scale(1.03); } 100% { opacity: 1; transform: scale(1); } }
@keyframes v2Fade { from { opacity: 0; } to { opacity: 1; } }
@keyframes v2Draw { from { opacity: 1; stroke-dashoffset: 900; } to { opacity: 1; stroke-dashoffset: 0; } }
@keyframes v2Highlight { 0% { opacity: 0; } 40% { opacity: 1; filter: brightness(1.18); } 100% { opacity: 1; filter: brightness(1); } }
#title { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.80s ease forwards; animation-delay: 0.00s; }
#timeline_base { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.80s ease forwards; animation-delay: 0.80s; }
#event_1924 { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2Pop 0.50s ease forwards; animation-delay: 1.60s; }
#connector_1 { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.40s ease forwards; animation-delay: 2.10s; }
#event_1934 { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.50s ease forwards; animation-delay: 2.50s; }
#connector_2 { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.40s ease forwards; animation-delay: 3.00s; }
#event_1952 { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.50s ease forwards; animation-delay: 3.40s; }
#connector_3 { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.50s ease forwards; animation-delay: 3.90s; }
#event_1978 { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2FadeSlide 0.50s ease forwards; animation-delay: 4.40s; }
#connector_4 { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.50s ease forwards; animation-delay: 4.90s; }
#event_2001 { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2Pop 0.50s ease forwards; animation-delay: 5.40s; }
#connector_5 { opacity: 0; transform-box: fill-box; transform-origin: center; stroke-dasharray: 900; stroke-dashoffset: 900; animation: v2Draw 0.40s ease forwards; animation-delay: 5.90s; }
#event_2017 { opacity: 0; transform-box: fill-box; transform-origin: center; animation: v2Pop 0.70s ease forwards; animation-delay: 6.30s; }
</style><rect width="1200" height="800" fill="#FDF8F5" />
  
  
  <g id="title" data-role="title" data-order="0">
    <text x="600" y="80" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="42" font-weight="bold" fill="#8B1A1A">中山大学发展历程</text>
    <line x1="400" y1="100" x2="800" y2="100" stroke="#C41E3A" stroke-width="3" />
  </g>
  
  
  <g id="timeline_base" data-role="background" data-order="1">
    <line x1="120" y1="420" x2="1080" y2="420" stroke="#C41E3A" stroke-width="4" />
    
    <polygon points="1080,420 1070,410 1070,430" fill="#C41E3A" />
  </g>
  
  
  <g id="event_1924" data-role="event" data-order="2">
    <circle cx="180" cy="420" r="35" fill="#C41E3A" />
    <circle cx="180" cy="420" r="30" fill="#E63946" />
    <text x="180" y="425" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" font-weight="bold" fill="#fff">1924</text>
    <text x="180" y="490" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="20" font-weight="bold" fill="#8B1A1A">创立</text>
    <text x="180" y="520" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#666">孙中山先生将广东大学</text>
    <text x="180" y="545" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#666">改名为中山大学</text>
  </g>
  
  
  <g id="connector_1" data-role="connector" data-order="8">
    <line x1="215" y1="420" x2="295" y2="420" stroke="#C41E3A" stroke-width="2" stroke-dasharray="8,4" />
    <polygon points="295,420 288,414 288,426" fill="#C41E3A" />
  </g>
  
  
  <g id="event_1934" data-role="event" data-order="3">
    <circle cx="330" cy="420" r="28" fill="#C41E3A" />
    <circle cx="330" cy="420" r="23" fill="#E63946" />
    <text x="330" y="425" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="bold" fill="#fff">1934</text>
    <text x="330" y="480" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" font-weight="bold" fill="#8B1A1A">发展</text>
    <text x="330" y="510" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#666">发展为学科齐全的</text>
    <text x="330" y="535" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#666">综合性大学</text>
  </g>
  
  
  <g id="connector_2" data-role="connector" data-order="9">
    <line x1="358" y1="420" x2="458" y2="420" stroke="#C41E3A" stroke-width="2" stroke-dasharray="8,4" />
    <polygon points="458,420 451,414 451,426" fill="#C41E3A" />
  </g>
  
  
  <g id="event_1952" data-role="event" data-order="4">
    <circle cx="490" cy="420" r="28" fill="#C41E3A" />
    <circle cx="490" cy="420" r="23" fill="#E63946" />
    <text x="490" y="425" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="bold" fill="#fff">1952</text>
    <text x="490" y="480" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" font-weight="bold" fill="#8B1A1A">调整</text>
    <text x="490" y="510" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#666">全国高校院系调整</text>
    <text x="490" y="535" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#666">奠定现代学科布局</text>
  </g>
  
  
  <g id="connector_3" data-role="connector" data-order="10">
    <line x1="518" y1="420" x2="638" y2="420" stroke="#C41E3A" stroke-width="2" stroke-dasharray="8,4" />
    <polygon points="638,420 631,414 631,426" fill="#C41E3A" />
  </g>
  
  
  <g id="event_1978" data-role="event" data-order="5">
    <circle cx="670" cy="420" r="28" fill="#C41E3A" />
    <circle cx="670" cy="420" r="23" fill="#E63946" />
    <text x="670" y="425" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="bold" fill="#fff">1978</text>
    <text x="670" y="480" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" font-weight="bold" fill="#8B1A1A">改革</text>
    <text x="670" y="510" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#666">改革开放后恢复高考</text>
    <text x="670" y="535" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#666">学校迎来新发展机遇</text>
  </g>
  
  
  <g id="connector_4" data-role="connector" data-order="11">
    <line x1="698" y1="420" x2="818" y2="420" stroke="#C41E3A" stroke-width="2" stroke-dasharray="8,4" />
    <polygon points="818,420 811,414 811,426" fill="#C41E3A" />
  </g>
  
  
  <g id="event_2001" data-role="event" data-order="6">
    <circle cx="850" cy="420" r="35" fill="#C41E3A" />
    <circle cx="850" cy="420" r="30" fill="#E63946" />
    <text x="850" y="425" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="bold" fill="#fff">2001</text>
    <text x="850" y="490" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="20" font-weight="bold" fill="#8B1A1A">985工程</text>
    <text x="850" y="520" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#666">入选985工程</text>
    <text x="850" y="545" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#666">进入国家重点建设行列</text>
  </g>
  
  
  <g id="connector_5" data-role="connector" data-order="12">
    <line x1="885" y1="420" x2="985" y2="420" stroke="#C41E3A" stroke-width="2" stroke-dasharray="8,4" />
    <polygon points="985,420 978,414 978,426" fill="#C41E3A" />
  </g>
  
  
  <g id="event_2017" data-role="event" data-order="7">
    <circle cx="1020" cy="420" r="35" fill="#C41E3A" />
    <circle cx="1020" cy="420" r="30" fill="#E63946" />
    <text x="1020" y="425" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" font-weight="bold" fill="#fff">2017</text>
    <text x="1020" y="490" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="20" font-weight="bold" fill="#8B1A1A">双一流</text>
    <text x="1020" y="520" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#666">入选双一流建设高校</text>
    <text x="1020" y="545" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#666">开启世界一流大学建设新征程</text>
  </g>
  
  
  <g id="decorations" data-role="decoration" data-order="13">
    
    <line x1="60" y1="420" x2="100" y2="420" stroke="#C41E3A" stroke-width="2" />
    <circle cx="50" cy="420" r="6" fill="#C41E3A" />
    
    
    <circle cx="600" cy="650" r="50" fill="none" stroke="#C41E3A" stroke-width="2" />
    <circle cx="600" cy="650" r="40" fill="none" stroke="#E63946" stroke-width="1" />
    <circle cx="600" cy="650" r="8" fill="#C41E3A" />
    <g stroke="#C41E3A" stroke-width="2">
      <line x1="600" y1="610" x2="600" y2="630" />
      <line x1="600" y1="670" x2="600" y2="690" />
      <line x1="560" y1="650" x2="580" y2="650" />
      <line x1="620" y1="650" x2="640" y2="650" />
      <line x1="572" y1="622" x2="585" y2="635" />
      <line x1="628" y1="665" x2="615" y2="652" />
      <line x1="572" y1="678" x2="585" y2="665" />
      <line x1="628" y1="635" x2="615" y2="648" />
    </g>
    <text x="600" y="720" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#8B1A1A">百年树人 砥砺前行</text>
  </g>
</svg>